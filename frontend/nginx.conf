server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /api/ {
        # Resolve the backend at request time (resolver + variable), not at
        # startup: the upstream's IP changes on every backend redeploy.
        resolver ${NGINX_RESOLVER} valid=10s;
        set $upstream http://${BACKEND_HOST}:8000;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        # SSE: no buffering, long-lived connections
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_set_header Connection "";
    }
}
